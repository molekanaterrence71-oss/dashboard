<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Admin Dashboard</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-color: #d2d2d7;
            --danger-color: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #005bb5;
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        #status-message {
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Dashboard App List Styles */
        .app-list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .app-list-item img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .app-details {
            flex-grow: 1;
        }

        .app-details h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .app-details p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .delete-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Dashboard Manager</h1>
            <p>Upload and manage apps for your App Store</p>
        </header>

        <!-- Upload Form Section -->
        <div class="card">
            <h2>Upload New App</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="appName">App Name</label>
                    <input type="text" id="appName" required placeholder="e.g. Flappy Bird">
                </div>

                <div class="form-group">
                    <label for="appDesc">Description</label>
                    <textarea id="appDesc" required placeholder="Briefly describe what the app does..."></textarea>
                </div>

                <div class="form-group">
                    <label for="appIcon">App Icon (Image)</label>
                    <input type="file" id="appIcon" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label for="appFile">App File (.zip, .apk, etc.)</label>
                    <input type="file" id="appFile" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">Upload to Store</button>
                <div id="status-message"></div>
            </form>
        </div>

        <!-- Live Database Section -->
        <div class="card">
            <h2>Live App Database</h2>
            <div id="live-apps-container">
                <p style="color: var(--text-muted); text-align: center;">Loading apps...</p>
            </div>
        </div>
    </div>

    <!-- Firebase and Logic -->
    <script type="module">
        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD44NWaXEYqR8b_8x5YnAcRQXK44OhtWdA",
            authDomain: "app-store-c8510.firebaseapp.com",
            projectId: "app-store-c8510",
            storageBucket: "app-store-c8510.firebasestorage.app",
            messagingSenderId: "13153104569",
            appId: "1:13153104569:web:1ea598b6e165879c162168",
            measurementId: "G-38J9DPWENY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        // Cloudinary Configuration
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/drqy2bwxu/auto/upload";
        const UPLOAD_PRESET = "ml_default";

        // DOM Elements
        const form = document.getElementById('upload-form');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-message');
        const liveAppsContainer = document.getElementById('live-apps-container');

        // Improved helper function to catch and extract exact Cloudinary errors
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const response = await fetch(CLOUDINARY_URL, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errBody = await response.json().catch(() => ({}));
                    const serverMessage = errBody.error?.message || `Status Code ${response.status}`;
                    throw new Error(`Cloudinary says: "${serverMessage}"`);
                }

                const data = await response.json();
                return data.secure_url;
            } catch (err) {
                // Catches network blocking issues (like adblockers or CORS)
                if (err.message.includes('fetch')) {
                    throw new Error("Network connection blocked. Check your adblocker or internet connection.");
                }
                throw err;
            }
        }

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('appName').value;
            const desc = document.getElementById('appDesc').value;
            const iconFile = document.getElementById('appIcon').files[0];
            const appFile = document.getElementById('appFile').files[0];

            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading Files...";
            statusMsg.style.color = "var(--text-main)";
            statusMsg.innerText = "Step 1/3: Uploading Icon...";

            try {
                // 1. Upload Icon
                const iconUrl = await uploadToCloudinary(iconFile);

                // 2. Upload App File
                statusMsg.innerText = "Step 2/3: Uploading App File...";
                const downloadUrl = await uploadToCloudinary(appFile);

                // 3. Save to Firebase
                statusMsg.innerText = "Step 3/3: Saving to Database...";
                const newAppRef = push(appsRef); 
                await set(newAppRef, {
                    name: name,
                    description: desc,
                    icon: iconUrl,
                    downloadUrl: downloadUrl,
                    timestamp: Date.now()
                });

                // Success Reset
                form.reset();
                statusMsg.style.color = "green";
                statusMsg.innerText = "Successfully uploaded to the App Store!";
                setTimeout(() => statusMsg.innerText = "", 5000);

            } catch (error) {
                console.error(error);
                statusMsg.style.color = "var(--danger-color)";
                // This will output the EXACT reason on your screen now
                statusMsg.innerHTML = `<strong>Upload Failed:</strong><br>${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload to Store";
            }
        });

        // Real-time Database Listener to display apps
        onValue(appsRef, (snapshot) => {
            liveAppsContainer.innerHTML = ''; 
            const data = snapshot.val();

            if (data) {
                const appsArray = Object.entries(data).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

                appsArray.forEach(([id, appData]) => {
                    const item = document.createElement('div');
                    item.className = 'app-list-item';
                    
                    const iconDisplay = appData.icon && appData.icon.startsWith('http') 
                        ? `<img src="${appData.icon}" alt="icon">` 
                        : `<div style="font-size: 2rem; margin-right: 15px;">📱</div>`;

                    item.innerHTML = `
                        ${iconDisplay}
                        <div class="app-details">
                            <h3>${appData.name}</h3>
                            <p>${appData.description ? appData.description.substring(0, 50) : ''}...</p>
                        </div>
                        <button class="delete-btn" data-id="${id}">Delete</button>
                    `;
                    liveAppsContainer.appendChild(item);
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(confirm("Are you sure you want to delete this app?")) {
                            const id = e.target.getAttribute('data-id');
                            remove(ref(db, `apps/${id}`));
                        }
                    });
                });

            } else {
                liveAppsContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No apps found.</p>';
            }
        });
    </script>
</body>
</html>
